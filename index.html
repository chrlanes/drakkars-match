<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 1080px; height: 1920px; overflow: hidden; background: #000; }
    #contentIFrame {
      position: absolute;
      top: 0; left: 0;
      width: 1080px;
      height: 1920px;
      border: none;
    }
    #dummyIFrame {
      display: none;
    }
    .prev, .next {
      cursor: pointer;
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      padding: 15px;
      color: white;
      font-weight: bold;
      font-size: 30px;
      visibility: hidden;
      z-index: 100;
      background: rgba(0,0,0,0.3);
    }
    .prev { left: 0; border-radius: 0 3px 3px 0; }
    .next { right: 0; border-radius: 3px 0 0 3px; }
  </style>
  <script src="publication-web-resources/script/main.js"></script>
</head>
<body onload="showHideArrows()">
  <iframe onload="showHideArrows()" id="contentIFrame" src="publication-web-resources/html/publication.html"></iframe>
  <iframe id="dummyIFrame"></iframe>
  <div class="prev" onclick="showPreviousPage()">&#10094;</div>
  <div class="next" onclick="showNextPage()">&#10095;</div>
</body>
</html>
