<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Programme de match — Drakkars de Caen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #111; width: 100%; height: 100%; overflow: hidden; }

    #viewer {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      touch-action: pan-y;
    }

    #strip {
      display: flex;
      height: 100%;
      transition: transform 0.3s ease;
    }

    .page {
      min-width: 100vw;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
    }

    .page img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .nav-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      font-size: 36px;
      font-weight: bold;
      color: white;
      background: rgba(0,0,0,0.4);
      padding: 18px 14px;
      z-index: 100;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      border-radius: 4px;
    }
    #prevBtn { left: 0; border-radius: 0 4px 4px 0; visibility: hidden; }
    #nextBtn { right: 0; border-radius: 4px 0 0 4px; }

    #counter {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.6);
      font-family: sans-serif;
      font-size: 13px;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="viewer">
    <div id="strip"></div>
  </div>
  <div class="nav-btn" id="prevBtn" onclick="go(-1)">&#10094;</div>
  <div class="nav-btn" id="nextBtn" onclick="go(1)">&#10095;</div>
  <div id="counter"></div>

  <script>
    var pages = [
      'publication-web-resources/Thumbnails/publication.jpg',
      'publication-web-resources/Thumbnails/publication-1.jpg',
      'publication-web-resources/Thumbnails/publication-2.jpg',
      'publication-web-resources/Thumbnails/publication-3.jpg',
      'publication-web-resources/Thumbnails/publication-4.jpg',
      'publication-web-resources/Thumbnails/publication-5.jpg',
      'publication-web-resources/Thumbnails/publication-6.jpg',
      'publication-web-resources/Thumbnails/publication-7.jpg',
      'publication-web-resources/Thumbnails/publication-8.jpg',
      'publication-web-resources/Thumbnails/publication-9.jpg',
      'publication-web-resources/Thumbnails/publication-10.jpg',
      'publication-web-resources/Thumbnails/publication-11.jpg',
      'publication-web-resources/Thumbnails/publication-12.jpg',
      'publication-web-resources/Thumbnails/publication-13.jpg',
      'publication-web-resources/Thumbnails/publication-14.jpg'
    ];

    var current = 0;
    var strip = document.getElementById('strip');

    // Créer les slides
    pages.forEach(function(src) {
      var slide = document.createElement('div');
      slide.className = 'page';
      var img = document.createElement('img');
      img.src = src;
      slide.appendChild(img);
      strip.appendChild(slide);
    });

    function update() {
      strip.style.transform = 'translateX(-' + (current * 100) + 'vw)';
      document.getElementById('prevBtn').style.visibility = current > 0 ? 'visible' : 'hidden';
      document.getElementById('nextBtn').style.visibility = current < pages.length - 1 ? 'visible' : 'hidden';
      document.getElementById('counter').textContent = (current + 1) + ' / ' + pages.length;
    }

    function go(dir) {
      var next = current + dir;
      if (next >= 0 && next < pages.length) {
        current = next;
        update();
      }
    }

    // Swipe tactile
    var startX = 0;
    var viewer = document.getElementById('viewer');
    viewer.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; }, { passive: true });
    viewer.addEventListener('touchend', function(e) {
      var dx = e.changedTouches[0].clientX - startX;
      if (Math.abs(dx) > 50) go(dx < 0 ? 1 : -1);
    }, { passive: true });

    update();
  </script>
</body>
</html>
