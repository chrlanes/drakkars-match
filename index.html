<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Programme de match — Drakkars de Caen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    #wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #contentIFrame {
      position: absolute;
      top: 0; left: 0;
      width: 1080px;
      height: 1920px;
      border: none;
      transform-origin: 0 0;
    }

    .prev, .next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      padding: 16px 12px;
      font-size: 28px;
      font-weight: bold;
      color: white;
      background: rgba(0,0,0,0.4);
      cursor: pointer;
      z-index: 10;
      visibility: hidden;
      user-select: none;
    }
    .prev { left: 0; border-radius: 0 4px 4px 0; }
    .next { right: 0; border-radius: 4px 0 0 4px; }
  </style>
</head>
<body>
  <div id="wrapper">
    <iframe id="contentIFrame" src="publication-web-resources/html/publication.html" onload="onFrameLoad()"></iframe>
  </div>
  <div class="prev" id="prevBtn" onclick="showPreviousPage()">&#10094;</div>
  <div class="next" id="nextBtn" onclick="showNextPage()">&#10095;</div>

  <script src="publication-web-resources/script/main.js"></script>
  <script>
    function scaleIframe() {
      var scale = window.innerWidth / 1080;
      var iframe = document.getElementById('contentIFrame');
      iframe.style.transform = 'scale(' + scale + ')';
      document.getElementById('wrapper').style.height = (1920 * scale) + 'px';
      document.body.style.height = (1920 * scale) + 'px';
      document.documentElement.style.height = (1920 * scale) + 'px';
      document.documentElement.style.overflow = 'auto';
      document.body.style.overflow = 'auto';
    }
    function onFrameLoad() {
      scaleIframe();
      if (typeof showHideArrows === 'function') showHideArrows();
    }
    window.addEventListener('resize', scaleIframe);
    scaleIframe();
  </script>
</body>
</html>
